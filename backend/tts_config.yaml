# TTS 语音合成配置
#
# 切换方式（任选其一）：
#   1) 改下面「当前 provider」一行
#   2) 不改文件，启动前设置环境变量：export TTS_PROVIDER=qwen-tts
#   3) 使用 backend/scripts/ 下各厂商脚本（脚本内会设置 TTS_PROVIDER）
#
# 内置 provider：cosyvoice | qwen-tts | step-audio
# 亦可通过 register_tts_provider() 注册其它名称。

# ----- 当前 provider -----
# 环境变量 TTS_PROVIDER 若已设置，会覆盖本行。
#
# 本项目默认使用本地 Step-Audio：后端必须用带 PyTorch 的 conda 环境启动（见 backend/scripts/run_backend_step_audio.sh）。
# 若临时改用云端 TTS：改为 qwen-tts / cosyvoice，并配置 DASHSCOPE_API_KEY。
#
provider: step-audio
# provider: qwen-tts
# provider: cosyvoice

# =============================================================================
# CosyVoice（阿里云 DashScope，需 DASHSCOPE_API_KEY）
# 文档: https://help.aliyun.com/zh/model-studio/realtime-speech-synthesis-cosyvoice
# =============================================================================
cosyvoice:
  model: cosyvoice-v3-flash
  voice: longanyang

# =============================================================================
# Qwen TTS（阿里云 DashScope，需 DASHSCOPE_API_KEY）
# 文档: https://help.aliyun.com/zh/model-studio/qwen-tts
# =============================================================================
qwen-tts:
  model: qwen3-tts-flash
  voice: Cherry
  language_type: Auto
  stream: true

  # 指令控制（仅 qwen3-tts-instruct-flash；改用该 model 后取消注释）
  # instructions: "语速适中，专业自信，适合面试场景。"
  # optimize_instructions: true

# =============================================================================
# Step-Audio 本地 TTS（Step-Audio-TTS-3B，无需 DASHSCOPE_API_KEY）
# 运行后端的 Python 环境须能 import torch（与 Step-Audio 推理环境一致），否则请改用 qwen-tts
# model_path 下须有 Step-Audio-Tokenizer/ 与 Step-Audio-TTS-3B/
# 相对路径相对于 backend/ 目录
# =============================================================================
step-audio:
  code_path: ../../step-audio
  model_path: ../../models
  speaker: Tingting
