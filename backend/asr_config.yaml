# ASR 语音识别配置
#
# 切换方式：
#   1) 修改下方 provider
#   2) 环境变量 ASR_PROVIDER 覆盖（与 TTS 的 TTS_PROVIDER 用法一致）
#
# 内置 provider：
#   qwen3-asr-flash-realtime — 阿里云 DashScope 实时语音识别（OmniRealtime / WebSocket）
#   local — 本地部署占位：需在代码中 register_asr_provider 或扩展 asr_providers

# ----- 当前 provider -----
provider: qwen3-asr-flash-realtime
# provider: local

# =============================================================================
# Qwen3 ASR Flash Realtime（DashScope，与 LLM/TTS 共用 DASHSCOPE_API_KEY）
# 文档: https://help.aliyun.com/zh/model-studio/qwen-real-time-speech-recognition
# =============================================================================
qwen3-asr-flash-realtime:
  model: qwen3-asr-flash-realtime
  # region: cn 使用北京；intl 使用新加坡
  region: cn
  # 亦可直接写死 url（若设置则优先于 region）
  # url: wss://dashscope.aliyuncs.com/api-ws/v1/realtime

  language: zh
  sample_rate: 16000
  input_audio_format: pcm

  # 文件/整段识别建议使用手动提交：关闭服务端 VAD，append 后 commit + end_session
  enable_turn_detection: false
  turn_detection_type: server_vad
  turn_detection_threshold: 0.0
  turn_detection_silence_duration_ms: 400

  end_session_timeout_sec: 120
  # 每次 append 的 PCM 字节数（约 100ms@16kHz mono s16le）
  pcm_chunk_bytes: 3200

# =============================================================================
# 本地 ASR（占位：默认未实现，返回 None；接入本地模型后实现并改 provider: local）
# =============================================================================
local:
  # 预留：例如模型路径、设备、采样率等
  backend: placeholder
